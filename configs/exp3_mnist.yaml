# ─────────────────────────────────────────────
# EXP 3 — MNIST: score only (sem caption nem geração)
# Objetivo: mostrar que ArtCLIP dá notas baixas para dígitos (não-artístico)
# Contrastar com scores humanos do APDDv2 (exp1)
# ─────────────────────────────────────────────
experiment:
  name: "exp3_mnist"

dataset:
  name: mnist
  path: "/sonic_home/larissa.gomide/data/mnist/"

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: false
    scoring:    true

sampling:
  n_samples: 500
  strategy: "stratified"

scoring:
  weights_dir: "/sonic_home/larissa.gomide/data/apddv2/model_weights/"
