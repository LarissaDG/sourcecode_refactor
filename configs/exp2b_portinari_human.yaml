# ─────────────────────────────────────────────
# EXP 2b — Portinari com descrições humanas (Description_en)
# Pula captioning — captions já vêm do CSV traduzido
# Generate (Janus-1B + Janus-7B) → Score
# ─────────────────────────────────────────────
experiment:
  name: "exp2b_portinari_human"

dataset:
  name: portinari
  path: "/sonic_home/larissa.gomide/data/portinari/"
  use_human_captions: true

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: true
    scoring:    true

sampling:
  n_samples: 500
  strategy: "random"

scoring:
  weights_dir: "/sonic_home/larissa.gomide/data/apddv2/model_weights/"
