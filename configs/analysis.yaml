    stats:
      ttest:      "Teste t de Welch"
      mannwhitney: "Mann-Whitney U"
      anova:      "ANOVA One-way"
      pearson:    "Pearson r"
      spearman:   "Spearman ρ"
      significant: "significativo"
      not_significant: "não significativo"

# ── Figuras ────────────────────────────────────────────────────────────────────
figures:
  dpi:        150
  figsize:    [12, 6]
  figsize_sq: [8, 8]     # para radar e scatter
  font_size:  12
  title_size: 14
  legend_loc: "best"
  grid:       true
  format:     "png"      # "png" | "pdf" | "svg"

# ── Testes estatísticos ────────────────────────────────────────────────────────
stats:
  alpha: 0.05            # nível de significância
  tests:
    - ttest
    - mannwhitney
    - anova
    - pearson
    - spearman

# ── Clustering (exp1 — melhores/piores imagens) ────────────────────────────────
clustering:
  n_clusters:  3
  n_top:       10        # top-N melhores e piores a destacar
  method:      "kmeans"  # "kmeans" | "agglomerative"

# ── Temporal (exp5) ────────────────────────────────────────────────────────────
temporal:
  n_videos_to_plot: 5    # nº de vídeos individuais no gráfico de linhas

# ── Score attributes usados nas análises ───────────────────────────────────────
score_attributes:
  - "Total aesthetic score"
  - "Theme and logic"
  - "Creativity"
  - "Layout and composition"
  - "Space and perspective"
  - "The sense of order"
  - "Light and shadow"
  - "Color"
  - "Details and texture"
  - "The overall"
  - "Mood"

radar_attributes:
  - "Theme and logic"
  - "Creativity"
  - "Layout and composition"
  - "Space and perspective"
  - "The sense of order"
  - "Light and shadow"
  - "Color"
  - "Details and texture"
  - "The overall"
  - "Mood"

# ── Caminhos ───────────────────────────────────────────────────────────────────
paths:
  outputs:       "/snfs1/speed/larissa.gomide/outputs/"
  reports:       "/snfs1/speed/larissa.gomide/reports/"
  apddv2_csv:    "/snfs1/speed/larissa.gomide/data/apddv2/APDDv2-10023.csv"
  apddv2_images: "/snfs1/speed/larissa.gomide/data/apddv2/APDDv2images/APDDv2images"
