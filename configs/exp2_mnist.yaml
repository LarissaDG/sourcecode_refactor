experiment:
  name: "exp2_mnist"

dataset:
  name: mnist
  path: "/data/mnist/"

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: false
    scoring:    true

sampling:
  n_samples: 500
  strategy: "stratified"   # garante dígitos balanceados
