# ─────────────────────────────────────────────
# EXP 4 — Consistência temporal em GIFs
# ─────────────────────────────────────────────
experiment:
  name: "exp4_temporal"

dataset:
  name: gif
  path: "/data/gifs/"

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: false
    scoring:    true

sampling:
  strategy: "sequential"
  n_samples: 500           # total de frames amostrados
