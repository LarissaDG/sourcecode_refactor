# ─────────────────────────────────────────────
# EXP 3b — Portinari com descrições humanas
# (pula captioning — captions já vêm do CSV)
# ─────────────────────────────────────────────
experiment:
  name: "exp3b_portinari_human"

dataset:
  name: portinari
  path: "/data/portinari/"
  use_human_captions: true

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: true
    scoring:    true

sampling:
  n_samples: 500
  strategy: "random"
