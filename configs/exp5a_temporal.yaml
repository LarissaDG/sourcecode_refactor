# ─────────────────────────────────────────────
# EXP 5a — Análise temporal: consistência de frames contíguos
# Frames sequenciais de vídeos de speed-drawing → Score
# Objetivo: mostrar que frames consecutivos têm notas parecidas
# ─────────────────────────────────────────────
experiment:
  name: "exp5a_temporal"

dataset:
  name: video
  path: "/sonic_home/larissa.gomide/data/temporal/"

pipeline:
  steps:
    sampling:   true
    captioning: false
    generation: false
    scoring:    true

sampling:
  strategy: "sequential"
  n_samples: 500

scoring:
  weights_dir: "/sonic_home/larissa.gomide/data/apddv2/model_weights/"
