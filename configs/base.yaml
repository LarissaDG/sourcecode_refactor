# Configuracoes globais -- sobrescritas pelos YAMLs de cada experimento

experiment:
  name: "base"
  seed: 42
  output_dir: "/snfs1/larissa.gomide/outputs/"

dataset:
  name: null           # apdd | mnist | portinari | gif | image
  path: null           # caminho para a base de dados

pipeline:
  steps:               # Ordem e ativacao das caixinhas
    sampling:   true
    captioning: false
    generation: false
    scoring:    true

sampling:
  n_samples: 500
  strategy: "random"   # random | stratified | sequential (para GIFs)

captioning:
  model_path: "deepseek-ai/Janus-Pro-7B"
  batch_size: 8

generation:
  models:
    - name: "Janus-Pro-1B"
      model_path: "deepseek-ai/Janus-Pro-1B"
    - name: "Janus-Pro-7B"
      model_path: "deepseek-ai/Janus-Pro-7B"
  batch_size: 4
  num_images_per_prompt: 1

scoring:
  weights_dir: null        # caminho para a pasta com os pesos do ArtClip
  agents:
    - name: "Total aesthetic score"
      weight_file: "1.Score_reg_weight--e4-train0.4393-test0.6835_best.pth"
    - name: "Theme and logic"
      weight_file: "2.Theme and logic_reg_weight--e5-train0.3792-test0.5953_best.pth"
    - name: "Creativity"
      weight_file: "3.Creativity_reg_weight--e5-train0.4212-test0.7122_best.pth"
    - name: "Layout and composition"
      weight_file: "4.Layout and composition_reg_weight--e6-train0.2783-test0.6342_best.pth"
    - name: "Space and perspective"
      weight_file: "5.Space and perspective_reg_weight--e7-train0.2168-test0.5998_best.pth"
    - name: "The sense of order"
      weight_file: "6.The sense of order_reg_weight--e5-train0.3708-test0.6206_best.pth"
    - name: "Light and shadow"
      weight_file: "7.Light and shadow_reg_weight--e7-train0.1937-test0.6518_best.pth"
    - name: "Color"
      weight_file: "8.Color_reg_weight--e5-train0.2905-test0.5871_best.pth"
    - name: "Details and texture"
      weight_file: "9.Details and texture_reg_weight--e4-train0.4385-test0.7034_best.pth"
    - name: "The overall"
      weight_file: "10.The overall_reg_weight--e3-train0.5131-test0.6343_best.pth"
    - name: "Mood"
      weight_file: "11.Mood_reg_weight--e7-train0.3108-test0.7097_best.pth"
  artclip_base_weight: "0.ArtCLIP_weight--e11-train2.4314-test4.0253_best.pth"
  save_csv: true
